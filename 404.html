<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        .back-arrow {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            color: #8b5bb7;
            text-decoration: none;
            font-weight: 600;
            background-color: rgba(245, 230, 204, 0.8);
            padding: 10px 15px;
            border-radius: 50px;
            transition: background-color 0.3s ease, color 0.3s ease;
            display: inline-block;
        }

        .back-arrow:hover {
            background-color: #8b5bb7;
            color: #f5e6cc;
        }

        @media screen and (max-width: 480px) {
            .back-arrow {
                font-size: 18px;
                padding: 6px 10px;
                top: unset;
                left: unset;
                position: relative;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-arrow">&larr; Back</a>

    <h1 class="fade-in" style="font-size: 6rem; margin-bottom: 0;">404</h1>
    <div class="vstack fade-in" style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
        <h2 style="color: #4a4a4a; font-size: 1.8rem;">Oops! Page not found.</h2>
        <p style="color: #555; max-width: 400px; margin-bottom: 30px;">
            Probably, you entered a wrong link. Return to the home page by a back button.
        </p>
    </div>
</div>
</body>
</html>
